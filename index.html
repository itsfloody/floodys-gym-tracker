<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Floody's Gym Tracker</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  color-scheme: dark;
  --black: #0a0a0a; --card: #1c1c1c; --border: #2a2a2a;
  --red: #e63329; --red-dim: rgba(230,51,41,0.12);
  --white: #f0ede8; --muted: #888; --tag-bg: #252525;
  --green: #2ecc71; --green-dim: rgba(46,204,113,0.12);
  --amber: #f39c12; --amber-dim: rgba(243,156,18,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
@keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse-next {
  0%   { border-color:var(--red); box-shadow:0 0 0 0 rgba(230,51,41,0.5); }
  70%  { border-color:var(--red); box-shadow:0 0 0 6px rgba(230,51,41,0); }
  100% { border-color:var(--red); box-shadow:0 0 0 0 rgba(230,51,41,0); }
}
@keyframes modalIn {
  from { opacity:0; transform:translateY(30px) scale(0.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
@keyframes go-flash {
  0%   { opacity:1; transform:scale(0.8); }
  40%  { opacity:1; transform:scale(1.15); }
  100% { opacity:0; transform:scale(1.4); }
}

input, button, select, textarea { font-size:16px; }

body { background:var(--black); color:var(--white); font-family:'DM Sans',sans-serif; min-height:100vh; padding:32px 16px 80px; }

header { text-align:center; margin-bottom:48px; animation:fadeDown 0.6s ease both; }
.eyebrow { font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--red); font-weight:600; margin-bottom:10px; }
h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(52px,12vw,96px); line-height:0.9; letter-spacing:2px; }
h1 span { color:var(--red); }
.subtitle { margin-top:14px; color:var(--muted); font-size:13px; letter-spacing:1px; }

.spotify-bar { display:flex; align-items:center; gap:12px; background:#141414; border:1px solid #1DB954; border-radius:10px; padding:12px 16px; margin-bottom:20px; }
.spotify-bar .sp-logo { color:#1DB954; font-size:20px; }
.spotify-bar .sp-text { flex:1; font-size:13px; color:var(--muted); }
.spotify-bar .sp-text strong { color:var(--white); display:block; margin-bottom:2px; }
.spotify-bar a { background:#1DB954; color:#000; font-weight:700; font-size:12px; padding:7px 14px; border-radius:20px; text-decoration:none; white-space:nowrap; flex-shrink:0; transition:background 0.2s; }
.spotify-bar a:hover { background:#1ed760; }

.tabs { display:flex; gap:4px; margin-bottom:20px; overflow-x:auto; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab { flex:1; min-width:72px; padding:7px 6px; background:var(--card); border:1px solid var(--border); cursor:pointer; border-radius:6px; color:var(--muted); transition:all 0.2s; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; text-align:center; }
.tab.active { background:var(--red); border-color:var(--red); color:#fff; }
.tab-name { font-family:'Bebas Neue',sans-serif; font-weight:500; letter-spacing:0.5px; font-size:14px; line-height:1; }
.tab-subtitle { font-size:9px; color:var(--muted); transition:color 0.2s; line-height:1.1; }
.tab.active .tab-subtitle { color:rgba(255,255,255,0.7); }
.day { display:none; } .day.active { display:block; }

.exercise { background:var(--card); border:1px solid var(--border); padding:14px; margin-bottom:12px; border-radius:10px; }
.exercise-header { display:flex; align-items:center; gap:12px; cursor:pointer; user-select:none; -webkit-user-select:none; justify-content:space-between; }
.exercise-header:hover { opacity:0.9; }
.ex-header-left { display:flex; align-items:center; gap:12px; flex:1; min-width:0; }
.ex-thumbnail { width:48px; height:48px; border-radius:8px; flex-shrink:0; object-fit:contain; border:1px solid var(--border); filter:invert(1); padding:2px; }
.ex-info { flex:1; min-width:0; }
.ex-name { font-weight:600; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ex-meta { font-size:12px; color:var(--muted); margin-top:2px; }
.ex-header-right { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.swap-btn { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:6px; width:28px; height:28px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; transition:all 0.2s; flex-shrink:0; }
.swap-btn:hover { border-color:var(--red); color:var(--red); background:var(--red-dim); }
.exercise-toggle { color:var(--red); font-size:12px; width:20px; text-align:center; transition:all 0.2s; }
.exercise-content { display:none; margin-top:12px; }
.exercise-content.expanded { display:block; }

.reps-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; font-size:13px; color:var(--muted); }
.reps { width:72px; background:transparent; border:none; border-bottom:1px solid #444; color:var(--white); text-align:center; padding:2px 4px; }

.video-toggle { display:inline-flex; align-items:center; gap:6px; margin:8px 0 4px; background:#1a1a1a; border:1px solid #333; border-radius:6px; padding:5px 10px; cursor:pointer; color:#cc0000; transition:all 0.2s; }
.video-toggle:hover { border-color:#cc0000; background:rgba(204,0,0,0.1); }
.video-wrap { display:none; margin:6px 0 8px; border-radius:8px; overflow:hidden; position:relative; padding-bottom:56.25%; height:0; }
.video-wrap.open { display:block; }
.video-wrap iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; border-radius:8px; }

.sets { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
.sets input { width:64px; text-align:center; background:#252525; border:2px solid #333; color:var(--white); padding:5px 4px; font-weight:600; border-radius:6px; transition:border-color 0.2s,box-shadow 0.2s,background 0.2s; }
.sets input::placeholder { color:#555; font-weight:400; }
.sets input.has-value { border-color:var(--green); background:var(--green-dim); color:var(--green); }
.sets input.is-pb      { border-color:var(--amber); background:var(--amber-dim); color:var(--amber); }
.sets input.is-next    { animation:pulse-next 1.4s ease infinite; background:var(--red-dim); }
.set-entry { display:flex; flex-direction:column; align-items:center; gap:3px; }
.set-label { font-size:9px; color:var(--muted); text-align:center; line-height:1.4; }
.pb-badge  { font-size:9px; color:var(--amber); font-weight:700; height:13px; }

/* Timer ring */
.timer { margin-top:10px; display:flex; align-items:center; gap:8px; border:1px solid #333; padding:8px; border-radius:6px; transition:border-color 0.3s; flex-wrap:wrap; }
.timer-ring-wrap { position:relative; width:40px; height:40px; flex-shrink:0; }
.timer-ring { position:absolute; inset:0; transform:rotate(-90deg); }
.timer-ring-bg { fill:none; stroke:#333; stroke-width:3; }
.timer-ring-progress { fill:none; stroke:var(--green); stroke-width:3; stroke-linecap:round; stroke-dasharray:113; stroke-dashoffset:0; transition:stroke 0.3s, stroke-dashoffset 1s linear; }
.timer-ring-time { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:11px; line-height:1; }
.timer button { background:#252525; border:1px solid #333; color:white; padding:4px 10px; cursor:pointer; border-radius:4px; transition:all 0.2s; white-space:nowrap; }
.timer button:hover { border-color:#555; }
.timer button.reset { background:var(--red); border-color:var(--red); color:var(--white); font-weight:600; }
.timer button.clear-weights { background:var(--green); border-color:var(--green); color:#000; font-weight:700; margin-left:auto; }
.timer button.clear-weights:hover { background:#27ae60; border-color:#27ae60; }
.timer .rest-label { color:var(--white); font-size:11px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; }
.timer input[type=number] { width:44px; background:#111; border:1px solid #333; color:white; text-align:center; border-radius:4px; padding:3px; }

/* GO flash */
.go-flash { position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center; pointer-events:none; }
.go-flash span { font-family:'Bebas Neue',sans-serif; font-size:clamp(80px,25vw,180px); color:var(--green); text-shadow:0 0 40px rgba(46,204,113,0.8), 0 0 80px rgba(46,204,113,0.4); animation:go-flash 0.9s ease-out forwards; }

.rpe-wrap { margin-top:12px; background:#141414; border:1px solid var(--border); border-radius:8px; padding:10px 12px; }
.rpe-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.rpe-label { font-size:11px; letter-spacing:0.5px; text-transform:uppercase; color:var(--muted); font-weight:600; }
.rpe-value { font-family:'Bebas Neue',sans-serif; font-size:22px; line-height:1; color:var(--white); min-width:60px; text-align:right; }
.rpe-desc  { font-size:10px; color:var(--muted); margin-top:1px; text-align:right; }
.rpe-slider { -webkit-appearance:none; appearance:none; width:100%; height:6px; border-radius:3px; outline:none; cursor:pointer; margin-top:4px; }
.rpe-slider::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:22px; height:22px; border-radius:50%; background:var(--white); border:2px solid var(--border); cursor:pointer; transition:border-color 0.2s; }
.rpe-slider::-webkit-slider-thumb:hover { border-color:var(--red); }
.rpe-slider::-moz-range-thumb { width:22px; height:22px; border-radius:50%; background:var(--white); border:2px solid var(--border); cursor:pointer; }

.chart { transition: opacity 0.2s ease; margin-top:10px; background:#111; border:1px solid #333; border-radius:6px; width:100%; max-width:300px; display:block; }
.toggle-chart { margin-top:6px; background:var(--card); border:1px solid var(--border); color:var(--white); padding:6px 12px; cursor:pointer; font-weight:500; border-radius:4px; transition:all 0.2s ease; }
.toggle-chart:hover { background:var(--tag-bg); border-color:var(--red); }

.ex-tip { margin-top:12px; display:flex; gap:10px; background:#141414; border:1px solid #2a2a2a; border-left:3px solid var(--red); border-radius:8px; padding:10px 12px; }
.ex-tip-icon { font-size:16px; flex-shrink:0; line-height:1.4; }
.ex-tip-text { font-size:12px; color:#b0aca6; line-height:1.7; }

.progression { margin-top:28px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px 18px; }
.progression h3 { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:1px; margin-bottom:12px; color:var(--white); }
.prog-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.prog-item { border-left:2px solid var(--red); padding-left:12px; }
.prog-item h5 { font-size:12px; font-weight:600; color:var(--white); margin-bottom:3px; }
.prog-item p { font-size:11px; color:var(--muted); line-height:1.5; }

/* ── Exercise Swap Modal ─────────────────────────────────────────── */
.modal-backdrop {
  position:fixed; inset:0; z-index:2000;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(4px);
  display:flex; align-items:flex-end; justify-content:center;
  padding:0;
  opacity:0; pointer-events:none;
  transition:opacity 0.25s;
}
.modal-backdrop.open { opacity:1; pointer-events:all; }
.modal {
  background:#161616;
  border:1px solid var(--border);
  border-radius:20px 20px 0 0;
  width:100%; max-width:560px;
  max-height:88vh;
  display:flex; flex-direction:column;
  transform:translateY(40px);
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  overflow:hidden;
}
.modal-backdrop.open .modal { transform:translateY(0); }
.modal-handle { width:40px; height:4px; background:#333; border-radius:2px; margin:12px auto 0; flex-shrink:0; }
.modal-header { padding:16px 20px 12px; flex-shrink:0; border-bottom:1px solid var(--border); }
.modal-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; }
.modal-subtitle { font-size:12px; color:var(--muted); margin-top:2px; }
.modal-search { width:100%; background:#111; border:1px solid #333; color:var(--white); border-radius:8px; padding:10px 14px; margin-top:12px; transition:border-color 0.2s; }
.modal-search:focus { outline:none; border-color:var(--red); }
.modal-body { overflow-y:auto; padding:12px 20px 24px; flex:1; }
.lib-group { margin-bottom:20px; }
.lib-group-title { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--red); font-weight:600; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid #222; }
.lib-item {
  display:flex; align-items:center; gap:12px;
  padding:10px 12px; border-radius:8px; cursor:pointer;
  border:1px solid transparent;
  transition:all 0.15s;
  margin-bottom:6px;
}
.lib-item:hover { background:#222; border-color:#333; }
.lib-item.selected { background:var(--red-dim); border-color:var(--red); }
.lib-thumb { width:40px; height:40px; border-radius:6px; object-fit:contain; border:1px solid #333; filter:invert(1); padding:2px; flex-shrink:0; }
.lib-thumb-placeholder { width:40px; height:40px; border-radius:6px; background:#222; border:1px solid #333; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:18px; }
.lib-info { flex:1; min-width:0; }
.lib-name { font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lib-detail { font-size:11px; color:var(--muted); margin-top:2px; }
.lib-check { color:var(--red); font-size:16px; flex-shrink:0; opacity:0; transition:opacity 0.15s; }
.lib-item.selected .lib-check { opacity:1; }
.modal-footer { padding:14px 20px; border-top:1px solid var(--border); flex-shrink:0; display:flex; gap:10px; }
.modal-cancel { flex:1; background:#222; border:1px solid #333; color:var(--white); padding:12px; border-radius:8px; cursor:pointer; font-weight:600; transition:all 0.2s; }
.modal-cancel:hover { border-color:#555; }
.modal-confirm { flex:2; background:var(--red); border:1px solid var(--red); color:#fff; padding:12px; border-radius:8px; cursor:pointer; font-weight:700; font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:1px; transition:all 0.2s; }
.modal-confirm:hover { background:#c0291f; }
.modal-confirm:disabled { opacity:0.4; cursor:not-allowed; }

.screenshot-bar-bottom { position:fixed; bottom:20px; right:20px; z-index:1000; }
@media(max-width:768px) { .screenshot-bar-bottom { left:20px; right:20px; display:flex; justify-content:center; } }
.screenshot-btn { display:inline-flex; align-items:center; gap:7px; background:linear-gradient(135deg,#1a1a1a 0%,#222 100%); border:1px solid #3a3a3a; border-radius:8px; padding:9px 16px; cursor:pointer; font-weight:600; color:var(--white); letter-spacing:0.3px; box-shadow:0 2px 12px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.04); transition:all 0.18s ease; white-space:nowrap; }
.screenshot-btn:hover { background:linear-gradient(135deg,#222 0%,#2a2a2a 100%); border-color:#555; transform:translateY(-1px); }
.screenshot-btn:active { transform:translateY(0); }
.screenshot-btn svg { flex-shrink:0; opacity:0.85; }
.screenshot-btn .btn-label { line-height:1; }
.screenshot-btn .btn-sub { display:block; font-size:9px; font-weight:400; color:var(--muted); letter-spacing:0.5px; margin-top:2px; text-transform:uppercase; }
.screenshot-btn.loading { opacity:0.5; pointer-events:none; }

.footer-attribution { text-align:center; font-size:10px; color:var(--muted); margin-top:40px; padding-top:20px; border-top:1px solid var(--border); line-height:1.6; }
.footer-attribution a { color:var(--muted); text-decoration:underline; }
.footer-attribution a:hover { color:var(--white); }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Fitness Journey</div>
  <h1>Floody's <span>Gym</span> Tracker</h1>
  <p class="subtitle">Strength. Consistency. Progress</p>
</header>

<div class="spotify-bar">
  <div class="sp-logo">🎵</div>
  <div class="sp-text"><strong>Now Playing</strong><span>Get hyped while you train</span></div>
  <a href="spotify://genre/workout-page" target="_blank" rel="noopener">Open Spotify</a>
</div>

<div class="tabs" id="tabs"></div>
<div id="app"></div>

<!-- Exercise Swap Modal -->
<div class="modal-backdrop" id="swapModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Swap Exercise</div>
      <div class="modal-subtitle">Choose a replacement for this slot</div>
      <input class="modal-search" id="modalSearch" type="text" placeholder="Search exercises…">
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="modal-cancel" id="modalCancel">Cancel</button>
      <button class="modal-confirm" id="modalConfirm" disabled>Swap Exercise</button>
    </div>
  </div>
</div>

<div class="screenshot-bar-bottom">
  <button class="screenshot-btn" id="screenshotBtn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    <span><span class="btn-label">Save Screenshot</span><span class="btn-sub">Track / Share your progress</span></span>
  </button>
</div>

<footer class="footer-attribution">
  Exercise images from <a href="https://commons.wikimedia.org" target="_blank" rel="noopener">Wikimedia Commons</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>

// ─── Exercise Library ──────────────────────────────────────────────────────
const EXERCISE_LIBRARY = [
  // ── CHEST
  { id:"bench",     name:"Barbell Bench Press",         muscle:"Chest", sets:4, reps:"6–8",   yt:"rT7DgCr-3pg", tip:"Your strength anchor. Retract your shoulder blades and keep them pinned to the bench throughout. Lower the bar to your lower chest — not your neck. Drive your feet into the floor and push the bar away from you." },
  { id:"incline",   name:"Dumbbell Incline Press",       muscle:"Chest", sets:3, reps:"10–12", yt:"hChjZQhX1Ls", tip:"Set the bench to 30–45°. Lower the dumbbells with your elbows at about 75° from your torso — not flared wide. Feel the upper chest stretch at the bottom, then press and squeeze at the top." },
  { id:"flye",      name:"Dumbbell Flat Bench Flye",     muscle:"Chest", sets:3, reps:"12–15", yt:"U5uW6jaOiLg", tip:"Keep a soft bend in your elbows throughout — think of hugging a big barrel. Wide arc down for a full chest stretch. This is about range of motion, not load — go lighter than you think." },
  { id:"cgbench",   name:"Close Grip Bench Press",       muscle:"Chest", sets:4, reps:"8–10",  yt:"A9MM-XkoWcw", tip:"Hands shoulder-width apart, elbows tucked close to your sides — don't let them flare out. Lower the bar to your lower chest. The triceps do the heavy lifting here, but the chest still assists." },
  { id:"cablefly",  name:"Cable Chest Fly",              muscle:"Chest", sets:3, reps:"12–15", yt:"Iwe6AmxVf7o", tip:"Set the cables to chest height. Keep a slight forward lean and soft bend in your elbows. Focus on bringing your hands together in an arc — like you're wrapping your arms around a tree. Constant tension throughout." },
  { id:"dips",      name:"Chest Dip",                   muscle:"Chest", sets:3, reps:"8–12",  yt:"T1L4smOP0L8", tip:"Lean your torso forward to hit chest rather than triceps. Let your elbows flare slightly outward. Lower until your shoulders are just below your elbows, then drive back up. Control the descent." },
  { id:"pecdeck",   name:"Pec Deck Machine",             muscle:"Chest", sets:3, reps:"12–15", yt:"hZ0CGRaKwbQ", tip:"Sit tall with your back flat against the pad. Bring the handles together in a controlled arc and squeeze your chest hard at full contraction. Resist the weight on the way back — don't let it slam." },
  { id:"declinedb", name:"Dumbbell Decline Press",       muscle:"Chest", sets:3, reps:"10–12", yt:"Pf1nDoqx_1A", tip:"The decline angle puts more focus on the lower chest. Keep your core tight and press the dumbbells in a slight arc toward each other at the top. Don't lock out completely — keep tension on the chest." },

  // ── BACK
  { id:"lat",       name:"Cable Lat Pulldown",           muscle:"Back",  sets:4, reps:"8–10",  yt:"CAwf7n6Luuc", tip:"Grip slightly wider than shoulder-width. Lean back slightly and pull the bar to your upper chest — not behind your neck. Initiate the pull by depressing your shoulder blades, not by yanking with your arms." },
  { id:"row",       name:"Dumbbell Single-Arm Row",      muscle:"Back",  sets:4, reps:"8–10",  yt:"KRN38chlkds", tip:"Brace your free hand on the bench, keep your back flat and parallel to the floor. Pull the dumbbell to your hip, not your armpit. Let the elbow travel past your torso and squeeze your lat at the top." },
  { id:"cablerow",  name:"Cable Seated Row",             muscle:"Back",  sets:3, reps:"10–12", yt:"GZbfZ033f74", tip:"Sit tall, don't round your lower back. Pull the handle to your belly button and pause with a hard squeeze at full contraction. Resist on the way out — the slow return builds as much muscle as the pull." },
  { id:"deadlift",  name:"Conventional Deadlift",        muscle:"Back",  sets:4, reps:"5",     yt:"r4MzxtBKyNE", tip:"Push the floor away rather than thinking about pulling the bar up. Keep the bar close to your body — it should drag up your shins. Hinge at the hips, brace your core hard, and keep your chest up throughout." },
  { id:"pullup",    name:"Pull-Up",                      muscle:"Back",  sets:4, reps:"Max",   yt:"eGo4IYlbE5g", tip:"Dead hang at the bottom, then initiate by pulling your shoulder blades down and back before your arms kick in. Pull your chest to the bar, not your chin over it. Control the descent — don't just drop." },
  { id:"tbar",      name:"T-Bar Row",                    muscle:"Back",  sets:4, reps:"8–10",  yt:"KDEl3AmZbVE", tip:"Hinge at the hips and keep your back at roughly 45°. Pull the handles to your lower chest and squeeze your shoulder blades together hard at the top. Don't use momentum — this isn't a deadlift." },

// Load saved exercise swaps from localStorage
function loadDays() {
  return DEFAULT_DAYS.map((day, di) => ({
    ...day,
    exercises: day.exercises.map((defaultId, ei) => {
      const saved = localStorage.getItem(`slot_${di}_${ei}`);
      return saved || defaultId;
    })
  }));
}

// ─── Helpers ───────────────────────────────────────────────────────────────
function getLibEntry(id) { return EXERCISE_LIBRARY.find(e => e.id === id) || null; }
const getRest    = id => parseInt(localStorage.getItem("rest_"+id)||45);
const formatTime = s  => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

function getWeekKey(ds) {
  const d=new Date(ds), f=new Date(d.getFullYear(),0,1);
  const days=Math.floor((d-f)/86400000);
  return `${d.getFullYear()}-W${Math.ceil((days+f.getDay()+1)/7)}`;
}
function saveHistory(id,w) {
  if(!w) return;
  const k="hist_"+id, t=new Date().toISOString().slice(0,10);
  const d=JSON.parse(localStorage.getItem(k)||"[]");
  d.push({date:t, weight:parseFloat(w)});
  localStorage.setItem(k, JSON.stringify(d));
}
function getWeeklySeries(id) {
  const d=JSON.parse(localStorage.getItem("hist_"+id)||"[]"), wk={};
  d.forEach(e=>{ const w=getWeekKey(e.date); if(!wk[w]||e.weight>wk[w]) wk[w]=e.weight; });
  return Object.keys(wk).sort().map(w=>({week:w, weight:wk[w]}));
}
function updateNextSet(exId) {
  const inputs=[...document.querySelectorAll(`.sets input[data-ex="${exId}"]`)];
  inputs.forEach(i=>i.classList.remove("is-next"));
  const next=inputs.find(i=>!i.value.trim());
  if(next) next.classList.add("is-next");
}

function drawChart(canvas, series) {
  const ctx=canvas.getContext("2d"); ctx.clearRect(0,0,canvas.width,canvas.height);
  if(series.length<2){ ctx.fillStyle="#888"; ctx.font="12px sans-serif"; ctx.fillText("Not enough data yet",20,60); return; }
  const p=30, w=canvas.width-p*2, h=canvas.height-p*2;
  const weights=series.map(s=>s.weight), min=Math.min(...weights), max=Math.max(...weights), sx=w/(series.length-1);
  ctx.strokeStyle="#222"; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){ const y=p+(h/4)*i; ctx.beginPath(); ctx.moveTo(p,y); ctx.lineTo(p+w,y); ctx.stroke(); }
  ctx.strokeStyle="#e63329"; ctx.lineWidth=2; ctx.beginPath();
  series.forEach((pt,i)=>{ const x=p+i*sx, y=p+h-((pt.weight-min)/(max-min||1))*h; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
  ctx.stroke();
  ctx.fillStyle="#fff";
  series.forEach((pt,i)=>{ const x=p+i*sx, y=p+h-((pt.weight-min)/(max-min||1))*h; ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill(); ctx.fillStyle="#888"; ctx.font="9px sans-serif"; ctx.fillText(pt.weight+"kg",x-10,y-7); ctx.fillStyle="#fff"; });
}

const timerStartBtns = {};

function handleWeightChange(input) {
  const val  = input.value.trim();
  const key  = input.dataset.key;
  const prev = parseFloat(input.dataset.prev) || 0;
  const num  = parseFloat(val);
  const pbEl = input.parentElement.querySelector(".pb-badge");
  localStorage.setItem(key, val);
  if(val && (!prev || num > prev)) saveHistory(input.dataset.ex, val);
  input.classList.remove("is-next");
  if(val && prev > 0 && num > prev) {
    input.className = "is-pb";
    if(pbEl) pbEl.textContent = "🏆";
  } else if(val) {
    input.className = "has-value";
    if(pbEl) pbEl.textContent = "";
  } else {
    input.className = "";
    if(pbEl) pbEl.textContent = "";
  }
  updateNextSet(input.dataset.ex);
  const nextInput = [...document.querySelectorAll(`.sets input[data-ex="${input.dataset.ex}"]`)]
    .find(i => !i.value.trim());
  if(nextInput) setTimeout(() => nextInput.focus(), 50);
  timerStartBtns[input.dataset.ex]?.click();
}

// ─── Dynamic day subtitle ─────────────────────────────────────────────────
function getDaySubtitle(dayIndex) {
  const day = DEFAULT_DAYS[dayIndex];
  const muscles = day.exercises.map((defaultId, ei) => {
    const id = localStorage.getItem(`slot_${dayIndex}_${ei}`) || defaultId;
    const lib = getLibEntry(id);
    return lib ? lib.muscle : null;
  }).filter(Boolean);
  // Deduplicate, preserving order
  const unique = [...new Set(muscles)];
  return unique.join(" & ");
}

// ─── Build tabs ────────────────────────────────────────────────────────────
function buildTabs() {
  const tabs=document.getElementById("tabs");
  tabs.innerHTML = "";
  DEFAULT_DAYS.forEach((d,i)=>{
    const t=document.createElement("div");
    t.className="tab"+(i===0?" active":"");
    t.innerHTML=`<span class="tab-name">${d.name}</span><span class="tab-subtitle">${getDaySubtitle(i)}</span>`;
    t.onclick=()=>switchTab(i);
    tabs.appendChild(t);
  });
}
function switchTab(i) {
  document.querySelectorAll(".tab").forEach((t,j)=>t.classList.toggle("active",i===j));
  document.querySelectorAll(".day").forEach((d,j)=>d.classList.toggle("active",i===j));
}

// ─── Build exercise cards ──────────────────────────────────────────────────
function build() {
  const app=document.getElementById("app");
  app.innerHTML = "";
  const DAYS = loadDays();

  DAYS.forEach((day,di)=>{
    const container=document.createElement("div");
    container.className="day"+(di===0?" active":"");

    day.exercises.forEach((exId, ei)=>{
      const lib = getLibEntry(exId);
      if(!lib) return;
      // Use slot key so weight data is per-slot, not per-exercise
      const slotPrefix = `s${di}_${ei}`;
      renderExerciseCard(container, lib, slotPrefix, di, ei);
    });

    const pg=document.createElement("div"); pg.className="progression";
    pg.innerHTML=`<h3>Progressive Overload Rules</h3><div class="prog-grid"><div class="prog-item"><h5>Add Weight</h5><p>When you hit the top of the rep range for all sets, add 2.5–5kg next session</p></div><div class="prog-item"><h5>Track Your Lifts</h5><p>Weights save automatically. 🏆 highlights a new personal best.</p></div><div class="prog-item"><h5>Deload Week</h5><p>Every 6–8 weeks, drop weight by 40% and do 2–3 sets per exercise</p></div><div class="prog-item"><h5>Protein Target</h5><p>Aim for 1.6–2g per kg of bodyweight daily for muscle growth</p></div></div>`;
    container.appendChild(pg);
    app.appendChild(container);
  });

  DAYS.forEach((day, di) => {
    day.exercises.forEach((exId, ei) => {
      const slotPrefix = `s${di}_${ei}`;
      updateNextSet(slotPrefix);
    });
  });

  wireUp();
}

function renderExerciseCard(container, lib, slotPrefix, di, ei) {
  const div=document.createElement("div");
  div.className="exercise";
  div.dataset.dayIndex = di;
  div.dataset.exIndex = ei;
  const thumb=getExerciseThumbnail(lib.id);

  let setsHTML='';
  for(let i=0;i<lib.sets;i++){
    const key=`w_${slotPrefix}_${i}`;
    const prev=localStorage.getItem("prev_"+key)||'';
    const val=localStorage.getItem(key)||'';
    const isPB=val&&prev&&parseFloat(val)>parseFloat(prev);
    const cls=val?(isPB?'is-pb':'has-value'):'';
    setsHTML+=`<div class="set-entry"><input type="number" min="0" step="0.5" data-key="${key}" data-ex="${slotPrefix}" data-prev="${prev}" value="${val}" placeholder="–" class="${cls}"><div class="set-label">S${i+1}${prev?`<br><span style="color:#555">${prev}kg</span>`:''}</div><div class="pb-badge">${isPB?'🏆':''}</div></div>`;
  }

  const savedRpe=parseInt(localStorage.getItem("rpe_"+slotPrefix)||3);
  const rpeCol=rpeColor(savedRpe);
  const rpePct=((savedRpe-1)/4)*100;

  div.innerHTML=`
    <div class="exercise-header">
      <div class="ex-header-left">
        ${thumb?`<img crossorigin="anonymous" src="${thumb}" alt="${lib.name}" class="ex-thumbnail" onerror="this.style.display='none'">` :''}
        <div class="ex-info">
          <div class="ex-name">${lib.name}</div>
          <div class="ex-meta">${lib.sets} sets • ${lib.reps} reps • <span style="color:var(--red);font-size:10px;text-transform:uppercase;letter-spacing:0.5px">${lib.muscle}</span></div>
        </div>
      </div>
      <div class="ex-header-right">
        <button class="swap-btn" title="Swap exercise" data-day="${di}" data-slot="${ei}">⇄</button>
        <div class="exercise-toggle">▲</div>
      </div>
    </div>
    <div class="exercise-content">
      <div class="reps-row">Target reps: <input class="reps" data-id="${slotPrefix}" value="${localStorage.getItem("r_"+slotPrefix)||lib.reps}"></div>
      <button class="video-toggle" data-ytid="${lib.yt}" data-open="false">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#cc0000"><path d="M23.5 6.2s-.3-2-1.2-2.8c-1.1-1.2-2.4-1.2-3-1.3C16.8 2 12 2 12 2s-4.8 0-7.3.1c-.6.1-1.9.1-3 1.3C.8 4.2.5 6.2.5 6.2S.2 8.5.2 10.8v2.1c0 2.3.3 4.6.3 4.6s.3 2 1.2 2.8c1.1 1.2 2.6 1.1 3.3 1.2C7.2 21.7 12 21.8 12 21.8s4.8 0 7.3-.2c.6-.1 1.9-.1 3-1.2.9-.8 1.2-2.8 1.2-2.8s.3-2.3.3-4.6v-2.1C23.8 8.5 23.5 6.2 23.5 6.2zM9.7 15.5V8.4l8.1 3.6-8.1 3.5z"/></svg>
        <span class="vt-label">Watch form</span>
      </button>
      <div class="video-wrap" id="vw_${slotPrefix}"></div>
      ${lib.tip ? `<div class="ex-tip"><div class="ex-tip-icon">💡</div><div class="ex-tip-text">${lib.tip}</div></div>` : ''}
      <div class="sets">${setsHTML}</div>
      <div class="timer" data-id="${slotPrefix}">
        <span class="rest-label">Rest</span>
        <span class="time">${formatTime(getRest(slotPrefix))}</span>
        <button class="start">Start</button>
        <button class="reset">Reset</button>
        <input type="number" class="rest" value="${getRest(slotPrefix)}" min="10" max="600">
        <span style="font-size:11px;color:var(--muted)">s</span>
        <button class="clear-weights" data-ex="${slotPrefix}">Clear</button>
      </div>
      <div class="rpe-wrap" data-id="${slotPrefix}">
        <div class="rpe-header">
          <div class="rpe-label">Effort (RPE)</div>
          <div>
            <div class="rpe-value" style="color:${rpeCol}">${savedRpe}<span style="font-size:13px;color:var(--muted)">/5</span></div>
            <div class="rpe-desc">${RPE_DESCS[savedRpe]}</div>
          </div>
        </div>
        <input type="range" class="rpe-slider" min="1" max="5" step="1" value="${savedRpe}"
          style="background:linear-gradient(to right,${rpeCol} 0%,${rpeCol} ${rpePct}%,#333 ${rpePct}%,#333 100%)">
      </div>
      <div class="chart-container"></div>
      <button class="toggle-chart">Show Progress</button>
    </div>`;

  container.appendChild(div);
}

// ─── Swap Modal ────────────────────────────────────────────────────────────
let swapTarget = null; // { dayIndex, slotIndex }
let selectedLibId = null;

function openSwapModal(dayIndex, slotIndex) {
  swapTarget = { dayIndex, slotIndex };
  selectedLibId = null;
  document.getElementById("modalConfirm").disabled = true;
  document.getElementById("modalSearch").value = "";
  renderLibrary("");
  document.getElementById("swapModal").classList.add("open");
  setTimeout(() => document.getElementById("modalSearch").focus(), 300);
}

function closeSwapModal() {
  document.getElementById("swapModal").classList.remove("open");
  swapTarget = null;
  selectedLibId = null;
}

function renderLibrary(filter) {
  const body = document.getElementById("modalBody");
  const currentId = swapTarget
    ? (localStorage.getItem(`slot_${swapTarget.dayIndex}_${swapTarget.slotIndex}`) ||
       DEFAULT_DAYS[swapTarget.dayIndex].exercises[swapTarget.slotIndex])
    : null;

  const q = filter.toLowerCase();
  const filtered = EXERCISE_LIBRARY.filter(e =>
    !q || e.name.toLowerCase().includes(q) || e.muscle.toLowerCase().includes(q)
  );

  // Group by muscle
  const groups = {};
  filtered.forEach(e => {
    if(!groups[e.muscle]) groups[e.muscle] = [];
    groups[e.muscle].push(e);
  });

  if(Object.keys(groups).length === 0) {
    body.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">No exercises found</div>`;
    return;
  }

  body.innerHTML = Object.keys(groups).map(muscle => {
    const items = groups[muscle].map(e => {
      const thumb = getExerciseThumbnail(e.id);
      const isCurrent = e.id === currentId;
      return `
        <div class="lib-item${isCurrent ? " selected" : ""}" data-id="${e.id}">
          ${thumb
            ? `<img crossorigin="anonymous" src="${thumb}" alt="${e.name}" class="lib-thumb" onerror="this.style.display='none'">`
            : `<div class="lib-thumb-placeholder">💪</div>`}
          <div class="lib-info">
            <div class="lib-name">${e.name}</div>
            <div class="lib-detail">${e.sets} sets · ${e.reps} reps</div>
          </div>
          <div class="lib-check">✓</div>
        </div>`;
    }).join("");
    return `<div class="lib-group"><div class="lib-group-title">${muscle}</div>${items}</div>`;
  }).join("");

  // Click to select
  body.querySelectorAll(".lib-item").forEach(item => {
    item.addEventListener("click", () => {
      body.querySelectorAll(".lib-item").forEach(i => i.classList.remove("selected"));
      item.classList.add("selected");
      selectedLibId = item.dataset.id;
      document.getElementById("modalConfirm").disabled = false;
    });
  });
}

function confirmSwap() {
  if(!swapTarget || !selectedLibId) return;
  const { dayIndex, slotIndex } = swapTarget;
  localStorage.setItem(`slot_${dayIndex}_${slotIndex}`, selectedLibId);
  closeSwapModal();
  // Preserve active tab
  const activeTab = document.querySelector(".tab.active");
  const activeIndex = [...document.querySelectorAll(".tab")].indexOf(activeTab);
  build();
  switchTab(activeIndex);
}

// ─── Wire up all interactions ──────────────────────────────────────────────
function wireUp() {

  // Collapse toggle — stop propagation from swap button
  document.querySelectorAll(".exercise-header").forEach(hdr=>{
    hdr.addEventListener("click", e => {
      if(e.target.closest(".swap-btn")) return;
      const toggle=hdr.querySelector(".exercise-toggle"), content=hdr.nextElementSibling;
      const expanded=content.classList.contains("expanded");
      content.classList.toggle("expanded",!expanded);
      toggle.classList.toggle("expanded",!expanded);
      toggle.textContent=!expanded?"▼":"▲";
    });
  });

  // Swap buttons
  document.querySelectorAll(".swap-btn").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      openSwapModal(parseInt(btn.dataset.day), parseInt(btn.dataset.slot));
    });
  });

  // Video toggles
  document.querySelectorAll(".video-toggle").forEach(btn=>{
    btn.onclick=()=>{
      const slotId=btn.closest(".exercise").querySelector(".reps").dataset.id;
      const wrap=document.getElementById("vw_"+slotId)||btn.nextElementSibling;
      const label=btn.querySelector(".vt-label");
      const isOpen=btn.dataset.open==="true";
      if(isOpen){
        wrap.classList.remove("open"); wrap.innerHTML="";
        btn.dataset.open="false"; label.textContent="Watch form";
      } else {
        wrap.innerHTML=`<iframe src="https://www.youtube-nocookie.com/embed/${btn.dataset.ytid}?rel=0&modestbranding=1" allowfullscreen loading="lazy" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe>`;
        wrap.classList.add("open"); btn.dataset.open="true"; label.textContent="Hide form";
      }
    };
  });

  // RPE sliders
  document.querySelectorAll(".rpe-slider").forEach(slider=>{
    const wrap=slider.closest(".rpe-wrap"), valEl=wrap.querySelector(".rpe-value"), descEl=wrap.querySelector(".rpe-desc"), exId=wrap.dataset.id;
    slider.addEventListener("input",()=>{
      const v=parseInt(slider.value), col=rpeColor(v), pct=((v-1)/4)*100;
      valEl.innerHTML=`${v}<span style="font-size:13px;color:var(--muted)">/5</span>`;
      valEl.style.color=col; descEl.textContent=RPE_DESCS[v];
      slider.style.background=`linear-gradient(to right,${col} 0%,${col} ${pct}%,#333 ${pct}%,#333 100%)`;
      localStorage.setItem("rpe_"+exId, v);
    });
  });

  // Timers with ring animation
  document.querySelectorAll(".timer").forEach(timer=>{
    const id=timer.dataset.id, timeEl=timer.querySelector(".time");
    const startBtn=timer.querySelector(".start"), resetBtn=timer.querySelector(".reset"), restInput=timer.querySelector(".rest");
    let duration=getRest(id), remaining=duration, interval=null;

    timerStartBtns[id] = startBtn;

    const circumference = 113;
    const ringWrap = document.createElement("div");
    ringWrap.className = "timer-ring-wrap";
    ringWrap.innerHTML = `
      <svg class="timer-ring" viewBox="0 0 40 40">
        <circle class="timer-ring-bg" cx="20" cy="20" r="18"/>
        <circle class="timer-ring-progress" cx="20" cy="20" r="18"/>
      </svg>
      <div class="timer-ring-time"></div>`;
    timeEl.replaceWith(ringWrap);
    const ringProgress = ringWrap.querySelector(".timer-ring-progress");
    const ringTime = ringWrap.querySelector(".timer-ring-time");

    function updateRing(rem, total) {
      const pct = rem / total;
      ringProgress.style.strokeDashoffset = circumference * (1 - pct);
      ringProgress.style.stroke = rem <= 5 ? "var(--red)" : rem <= total * 0.4 ? "var(--amber)" : "var(--green)";
      ringTime.textContent = formatTime(rem);
    }
    updateRing(remaining, duration);

    function flashGo() {
      const el = document.createElement("div");
      el.className = "go-flash";
      el.innerHTML = "<span>GO!</span>";
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 950);
    }

    restInput.onchange=()=>{
      duration=parseInt(restInput.value);
      localStorage.setItem("rest_"+id, duration);
      remaining=duration; updateRing(remaining, duration); timer.style.borderColor="#333";
    };
    startBtn.onclick=()=>{
      if(interval) return;
      startBtn.textContent="Resting…";
      interval=setInterval(()=>{
        remaining--;
        updateRing(remaining, duration);
        if(remaining<=0){
          clearInterval(interval); interval=null; remaining=duration;
          updateRing(remaining, duration);
          timer.style.borderColor="var(--green)"; startBtn.textContent="Start";
          flashGo();
        }
      },1000);
    };
    resetBtn.onclick=()=>{
      clearInterval(interval); interval=null; remaining=duration;
      updateRing(remaining, duration); timer.style.borderColor="#333"; startBtn.textContent="Start";
    };
  });

  // Clear weights — pre-fill with previous
  document.querySelectorAll(".clear-weights").forEach(btn=>{
    btn.onclick=()=>{
      const exId=btn.dataset.ex;
      document.querySelectorAll(`.sets input[data-ex="${exId}"]`).forEach(input=>{
        const current=input.value.trim();
        if(current) {
          localStorage.setItem("prev_"+input.dataset.key, current);
          input.dataset.prev = current;
        }
        localStorage.removeItem(input.dataset.key);
        const prev = input.dataset.prev;
        if(prev) {
          input.value = prev;
          input.className = "has-value";
          input.select();
        } else {
          input.value = ""; input.className = "";
        }
        const label=input.parentElement.querySelector(".set-label");
        if(label&&current){ const span=label.querySelector("span"); if(span) span.textContent=`${current}kg`; else label.innerHTML+=`<br><span style="color:#555">${current}kg</span>`; }
        const pb=input.parentElement.querySelector(".pb-badge"); if(pb) pb.textContent="";
      });
      const first = document.querySelector(`.sets input[data-ex="${exId}"]`);
      if(first) first.focus();
      updateNextSet(exId);
    };
  });

  // Weight input change
  document.addEventListener("change", e=>{
    const t=e.target;
    if(t.matches(".sets input")) handleWeightChange(t);
  });

  // Enter key — save + start timer + move focus
  document.addEventListener("keydown", e=>{
    if(e.key === "Enter" && e.target.matches(".sets input")) {
      e.preventDefault();
      handleWeightChange(e.target);
      timerStartBtns[e.target.dataset.ex]?.click();
      const inputs = [...document.querySelectorAll(`.sets input[data-ex="${e.target.dataset.ex}"]`)];
      const idx = inputs.indexOf(e.target);
      const next = inputs[idx + 1];
      if(next) setTimeout(() => { next.focus(); next.select(); }, 50);
    }
  });

  // Reps
  document.querySelectorAll(".reps").forEach(input=>{
    input.addEventListener("input", ()=>localStorage.setItem("r_"+input.dataset.id, input.value));
  });

  // Charts
  document.querySelectorAll(".exercise").forEach(exEl=>{
    const slotId=exEl.querySelector(".reps").dataset.id;
    const btn=exEl.querySelector(".toggle-chart");
    const chartContainer=exEl.querySelector(".chart-container");
    const history = getWeeklySeries(slotId);
    if(history.length < 2){ btn.style.display = "none"; }
    btn.onclick=()=>{
      let canvas=chartContainer.querySelector("canvas");
      if(!canvas){
        canvas=document.createElement("canvas");
        canvas.className="chart"; canvas.width=300; canvas.height=120;
        canvas.style.display="block";
        chartContainer.appendChild(canvas);
        drawChart(canvas, getWeeklySeries(slotId));
        btn.textContent="Hide Progress"; return;
      }
      const visible=canvas.style.display==="block";
      canvas.style.display=visible?"none":"block";
      btn.textContent=visible?"Show Progress":"Hide Progress";
      if(!visible) drawChart(canvas, getWeeklySeries(slotId));
    };
  });

  // Screenshot
  document.getElementById("screenshotBtn").addEventListener("click", async()=>{
    const btn=document.getElementById("screenshotBtn");
    const bar=document.querySelector(".screenshot-bar-bottom");
    btn.classList.add("loading");
    btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span><span class="btn-label">Capturing…</span></span>`;
    const activeDayEl=document.querySelector(".day.active");
    const activeDayName=document.querySelector(".tab.active")?.textContent||"Session";
    const expandedState=[];
    activeDayEl.querySelectorAll(".exercise-content").forEach(c=>expandedState.push(c.classList.contains("expanded")));
    activeDayEl.querySelectorAll(".exercise-content:not(.expanded)").forEach(c=>{
      c.classList.add("expanded");
      const t=c.previousElementSibling.querySelector(".exercise-toggle");
      if(t){ t.classList.add("expanded"); t.textContent="▼"; }
    });
    document.querySelectorAll(".video-wrap.open").forEach(w=>{
      w.classList.remove("open"); w.innerHTML="";
      const t=w.previousElementSibling;
      if(t){ t.dataset.open="false"; t.querySelector(".vt-label").textContent="Watch form"; }
    });
    activeDayEl.querySelectorAll(".timer").forEach(t=>t.style.display="none");
    
    activeDayEl.querySelectorAll(".progression").forEach(p=>p.style.display="none");
    bar.style.display="none";
    await new Promise(r=>setTimeout(r,150));
    function restoreUI() {
      bar.style.display="";
      activeDayEl.querySelectorAll(".timer").forEach(t=>t.style.display="");
      
      activeDayEl.querySelectorAll(".progression").forEach(p=>p.style.display="");
      activeDayEl.querySelectorAll(".exercise-content").forEach((c,i)=>{
        if(!expandedState[i]&&c.classList.contains("expanded")){
          c.classList.remove("expanded");
          const t=c.previousElementSibling.querySelector(".exercise-toggle");
          if(t){ t.classList.remove("expanded"); t.textContent="▲"; }
        }
      });
    }
    try {
      const today=new Date().toISOString().slice(0,10);
      const canvas=await html2canvas(activeDayEl, {
        backgroundColor:"#0a0a0a", scale: window.devicePixelRatio > 1 ? 1.5 : 1, useCORS:true, logging:false
      });
      const link=document.createElement("a");
      link.href=canvas.toDataURL("image/png");
      link.download=`floody-${activeDayName}-${today}.png`;
      link.click();
    } catch(err) { alert("Screenshot failed: "+err.message); }
    finally { restoreUI(); }
    btn.classList.remove("loading");
    btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span><span class="btn-label">Save Screenshot</span><span class="btn-sub">Track / Share your progress</span></span>`;
  });
}

// ─── Modal events ──────────────────────────────────────────────────────────
document.getElementById("modalCancel").addEventListener("click", closeSwapModal);
document.getElementById("swapModal").addEventListener("click", e => {
  if(e.target === document.getElementById("swapModal")) closeSwapModal();
});
document.getElementById("modalConfirm").addEventListener("click", confirmSwap);
document.getElementById("modalSearch").addEventListener("input", e => {
  renderLibrary(e.target.value);
});

// ─── Init ──────────────────────────────────────────────────────────────────
buildTabs();
build();
if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js').catch(e=>console.warn('SW:',e)); }
</script>
